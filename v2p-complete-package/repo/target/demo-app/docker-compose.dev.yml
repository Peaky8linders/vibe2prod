services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: taskdb
    volumes:
      - ../../deploy/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d taskdb"]
      interval: 5s
      timeout: 3s
      retries: 10
