# =============================================================================
# .github/workflows/ci.yml — Production CI pipeline
#
# This is the TARGET STATE for CI. The hardening loop produces code that
# passes this pipeline. Gate structure mirrors the eval harness:
#   - L1: type check, lint, test, secrets scan
#   - L2: integration tests
#   - Security: dependency audit, SAST
#   - Deploy: only on main, only if all gates pass
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # -----------------------------------------------------------------------
  # L1: Fast deterministic checks
  # -----------------------------------------------------------------------
  l1-gates:
    name: L1 — Type Check + Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Unit tests
        run: npm test -- --coverage
        env:
          CI: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # -----------------------------------------------------------------------
  # Security: Secrets scan + dependency audit + SAST
  # -----------------------------------------------------------------------
  security-gates:
    name: Security — Secrets + Deps + SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for gitleaks

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Check for known vulnerabilities
        run: npx better-npm-audit audit --level high

  # -----------------------------------------------------------------------
  # L2: Integration tests (requires services)
  # -----------------------------------------------------------------------
  l2-integration:
    name: L2 — Integration Tests
    needs: [l1-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: taskdb_test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/taskdb_test

      - name: Integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/taskdb_test
          JWT_SECRET: test-secret-for-ci-only
          NODE_ENV: test

  # -----------------------------------------------------------------------
  # Build + Push (main only)
  # -----------------------------------------------------------------------
  build-and-push:
    name: Build + Push Docker Image
    needs: [l1-gates, security-gates, l2-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write  # for OIDC to cloud provider

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f deploy/docker/Dockerfile \
            -t ${{ vars.REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ vars.REGISTRY }}/${{ vars.IMAGE_NAME }}:latest \
            .

      - name: Push to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ vars.REGISTRY }} -u ${{ vars.REGISTRY_USER }} --password-stdin
          docker push ${{ vars.REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ vars.REGISTRY }}/${{ vars.IMAGE_NAME }}:latest

  # -----------------------------------------------------------------------
  # Deploy (main only, after build)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Deploy ${{ github.sha }} to production"
          # Replace with your deploy command:
          # - AWS ECS: aws ecs update-service ...
          # - K8s:     kubectl set image ...
          # - Fly.io:  fly deploy ...
          # - Railway: railway up ...

      - name: Smoke test
        run: |
          sleep 10
          curl --fail --silent --show-error ${{ vars.PRODUCTION_URL }}/health || exit 1

      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deploy ${STATUS}: ${{ github.sha }}"
